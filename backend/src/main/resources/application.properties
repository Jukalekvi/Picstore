# Application name
spring.application.name=backend

# H2 Console settings
# Enable the H2 web interface
spring.h2.console.enabled=true
# Set the URL path for the console (access via /h2-console)
spring.h2.console.path=/h2-console
# Allow remote access to the console
spring.h2.console.settings.web-allow-others=true

# Database Configuration
# JDBC URL: Using an in-memory database named "testdb"
# DB_CLOSE_DELAY=-1 prevents data loss when the last connection is closed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
# Changed to 'create-drop' to ensure missing columns (like LATITUDE/LONGITUDE) are re-created
spring.jpa.hibernate.ddl-auto=create-drop
# Enable SQL logging to the terminal
spring.jpa.show-sql=true
# Make the logged SQL readable (pretty-print)
spring.jpa.properties.hibernate.format_sql=true

# Compatibility fix for H2 Console path matching in newer Spring Boot versions
spring.mvc.pathmatch.matching-strategy=ant_path_matcher